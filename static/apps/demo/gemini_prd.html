<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRD 디스커버리 로그 · 사무실 장비 관리 웹앱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#e9ecf1;
    --card:#ffffff;
    --ink:#141a26;
    --muted:#5b6577;
    --faint:#8b94a4;
    --line:#dde2ea;
    --line-soft:#eaeef3;
    --blue:#2e51ff;
    --blue-ink:#1b32b8;
    --blue-wash:#eef1ff;
    --green:#0f9d63;
    --green-wash:#e7f6ef;
    --amber:#c77800;
    --amber-wash:#fdf1dd;
    --red:#d8433c;
    --red-wash:#fdecea;
    --slate-wash:#eef1f5;
    --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;
    --display:'Space Grotesk',var(--sans);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;
    line-height:1.6;
  }
  .frame{
    width:100%;max-width:860px;
    height:100dvh;
    display:flex;flex-direction:column;
    background:var(--paper);
  }

  /* ---------- HEADER ---------- */
  header{
    padding:20px 26px 14px;
    border-bottom:1px solid var(--line);
    background:var(--paper);
    flex:0 0 auto;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--faint);font-weight:500;
    display:flex;align-items:center;gap:9px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--blue);display:inline-block}
  .h-title{
    font-family:var(--sans);
    font-size:19px;font-weight:700;letter-spacing:-.01em;
    margin-top:7px;
  }
  .h-title small{color:var(--faint);font-weight:500;font-size:14px;margin-left:6px}
  .segments{
    display:flex;gap:4px;margin-top:15px;
  }
  .seg{
    flex:1;height:5px;border-radius:3px;background:var(--line);
    transition:background .25s ease;position:relative;cursor:pointer;
  }
  .seg[data-kind="setup"].on{background:var(--ink)}
  .seg[data-kind="qa"].on{background:var(--blue)}
  .seg[data-kind="deliver"].on{background:var(--green)}
  .seg.done{opacity:.9}
  .seg:not(.on){background:var(--line)}
  .seg:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

  /* ---------- CARD BODY ---------- */
  .stage{
    flex:1 1 auto;overflow-y:auto;
    padding:26px;
    scrollbar-width:thin;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:30px 30px 34px;
    box-shadow:0 1px 0 rgba(20,26,38,.04),0 18px 40px -28px rgba(20,26,38,.35);
  }
  .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .kind{
    font-family:var(--mono);font-size:11px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;
    padding:5px 10px;border-radius:999px;white-space:nowrap;
  }
  .kind.setup{background:var(--slate-wash);color:var(--ink)}
  .kind.qa{background:var(--blue-wash);color:var(--blue-ink)}
  .kind.deliver{background:var(--green-wash);color:var(--green)}
  .idx{
    font-family:var(--display);font-weight:700;
    font-size:15px;color:var(--faint);white-space:nowrap;
  }
  .idx b{color:var(--ink)}
  .title{
    font-size:24px;font-weight:700;letter-spacing:-.02em;
    margin-top:16px;line-height:1.3;
  }
  .rule{height:1px;background:var(--line-soft);margin:20px 0 22px}
  .body{font-size:15px;color:#2a3141}
  .body p{margin-bottom:12px}
  .body p:last-child{margin-bottom:0}

  /* labelled blocks */
  .block{margin-bottom:16px}
  .block:last-child{margin-bottom:0}
  .lbl{
    font-family:var(--mono);font-size:10.5px;font-weight:700;
    letter-spacing:.16em;text-transform:uppercase;color:var(--faint);
    margin-bottom:8px;display:block;
  }
  .qbox{
    background:var(--blue-wash);border:1px solid #dfe4ff;
    border-radius:12px;padding:15px 17px;
  }
  .qbox .lbl{color:var(--blue-ink)}
  .abox{
    background:var(--slate-wash);border:1px solid var(--line);
    border-radius:12px;padding:15px 17px;
  }
  .rbox{
    background:var(--green-wash);border:1px solid #cfe9dd;
    border-radius:12px;padding:15px 17px;
  }
  .rbox .lbl{color:var(--green)}

  ul.opts{list-style:none;margin:4px 0 0}
  ul.opts li{
    position:relative;padding:5px 0 5px 26px;font-size:14.5px;
  }
  ul.opts li::before{
    content:attr(data-n);position:absolute;left:0;top:5px;
    font-family:var(--mono);font-size:11px;font-weight:700;
    width:18px;height:18px;border-radius:5px;
    background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--muted);
  }
  ul.opts li.pick::before{background:var(--blue);border-color:var(--blue);color:#fff}
  ul.opts li.pick{font-weight:600}
  ul.opts li.drop{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--red)}
  ul.opts li.drop::before{content:"×";background:var(--red-wash);border-color:#f3cfcc;color:var(--red)}

  ul.plain{list-style:none;margin:2px 0 0}
  ul.plain li{position:relative;padding:4px 0 4px 18px;font-size:14.5px}
  ul.plain li::before{
    content:"";position:absolute;left:2px;top:12px;
    width:6px;height:6px;border-radius:50%;background:var(--blue);
  }
  .deliver ul.plain li::before{background:var(--green)}

  .kv{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:14.5px}
  .kv dt{font-weight:600;color:var(--muted);white-space:nowrap}
  .kv dd{color:var(--ink)}

  .chip{
    display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;
    padding:2px 8px;border-radius:6px;letter-spacing:.04em;
  }
  .chip.urgent{background:var(--red-wash);color:var(--red)}
  .chip.normal{background:var(--amber-wash);color:var(--amber)}
  .chip.plus{background:var(--blue-wash);color:var(--blue-ink)}

  .sec-title{
    font-size:15px;font-weight:700;margin:18px 0 9px;
    display:flex;align-items:center;gap:9px;
  }
  .sec-title .n{
    font-family:var(--mono);font-size:12px;color:#fff;background:var(--green);
    width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;
  }
  .qa .sec-title .n{background:var(--blue)}
  .sec-title:first-child{margin-top:0}
  .note{
    margin-top:16px;font-size:13.5px;color:var(--muted);
    background:var(--amber-wash);border:1px solid #f4dcae;
    border-radius:10px;padding:12px 15px;
  }
  .note b{color:var(--amber)}
  code{font-family:var(--mono);font-size:12.5px;background:var(--slate-wash);
    padding:1px 6px;border-radius:5px;color:var(--ink)}

  /* card transition */
  @keyframes slidein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card.anim{animation:slidein .32s cubic-bezier(.2,.7,.2,1)}
  @media (prefers-reduced-motion:reduce){.card.anim{animation:none}.seg{transition:none}}

  /* ---------- FOOTER NAV ---------- */
  footer{
    flex:0 0 auto;
    padding:14px 26px;
    border-top:1px solid var(--line);
    background:rgba(233,236,241,.9);
    backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:space-between;gap:14px;
  }
  .nav-btn{
    font-family:var(--sans);font-size:14px;font-weight:600;
    padding:11px 18px;border-radius:11px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;
    transition:transform .1s ease,border-color .15s ease,background .15s ease;
    min-width:104px;justify-content:center;
  }
  .nav-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue-ink)}
  .nav-btn:active:not(:disabled){transform:translateY(1px)}
  .nav-btn:disabled{opacity:.4;cursor:not-allowed}
  .nav-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .nav-btn.primary:hover:not(:disabled){background:var(--blue);border-color:var(--blue);color:#fff}
  .nav-btn:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
  .counter{
    font-family:var(--mono);font-size:13px;color:var(--muted);
    text-align:center;line-height:1.3;
  }
  .counter b{color:var(--ink);font-size:15px}
  .counter span{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:2px}

  @media (max-width:560px){
    header{padding:16px 16px 12px}
    .stage{padding:16px}
    .card{padding:22px 20px 26px;border-radius:14px}
    .title{font-size:21px}
    footer{padding:12px 16px}
    .nav-btn{min-width:84px;padding:11px 14px}
    .h-title{font-size:17px}
  }
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="eyebrow"><span class="dot"></span>PRD DISCOVERY LOG · GOOGLE AI STUDIO</div>
    <div class="h-title">사무실 장비 관리 웹앱 기획 진행<small>HTML 작성 직전까지</small></div>
    <div class="segments" id="segments" aria-label="진행 단계"></div>
  </header>

  <main class="stage" id="stage" tabindex="-1"></main>

  <footer>
    <button class="nav-btn" id="prev">◀ 이전</button>
    <div class="counter"><b id="cur">01</b> / <span id="total">14</span><span id="kindLabel">시작</span></div>
    <button class="nav-btn primary" id="next">다음 ▶</button>
  </footer>
</div>

<script>
const stages = [
  {
    kind:"setup", tag:"지시 · SETUP", title:"프로젝트 지시 & 역할 정의",
    html:`
      <div class="block">
        <p>사용자가 웹앱 기획을 위한 조건과 진행 방식을 먼저 정의했습니다.</p>
      </div>
      <div class="block abox">
        <span class="lbl">사용자가 정의한 조건</span>
        <dl class="kv">
          <dt>역할</dt><dd>웹앱 기획 전문가</dd>
          <dt>목표</dt><dd>사무실 장비 관리 웹앱 제작</dd>
          <dt>개발 환경</dt><dd>Google AI Studio 사용</dd>
          <dt>산출물</dt><dd>PRD(제품 요구사항 정의서)</dd>
          <dt>진행 방식</dt><dd>토론형 · 필요한 정보는 질문으로 확보</dd>
          <dt>톤</dt><dd>서술어·수식어 없이 핵심만, 대화식</dd>
        </dl>
      </div>
      <div class="block rbox">
        <span class="lbl">전문가 응답</span>
        <p style="margin:0">조건 수용. PRD 작성을 위한 디스커버리 Q&A를 시작. 이후 10개의 질문으로 요구사항을 하나씩 확정한다.</p>
      </div>`
  },
  {
    kind:"qa", tag:"질의응답 01", title:"타겟 유저 & 핵심 기능",
    html:`
      <div class="block qbox">
        <span class="lbl">Q — 전문가</span>
        <p style="margin:0">주 관리자(타겟 유저)는 누구이며, Google AI Studio로 구현하려는 핵심 AI 기능은 무엇인가?</p>
      </div>
      <div class="block abox">
        <span class="lbl">A — 사용자</span>
        <ul class="opts">
          <li data-n="1" class="pick">일반 직원</li>
          <li data-n="2" class="pick">장비 대여 현황 관리 및 신청 접수</li>
        </ul>
      </div>
      <div class="block rbox">
        <span class="lbl">확정</span>
        <dl class="kv">
          <dt>타겟</dt><dd>일반 직원</dd>
          <dt>핵심 기능</dt><dd>장비 대여 현황 파악 및 신청</dd>
        </dl>
      </div>`
  },
  {
    kind:"qa", tag:"질의응답 02", title:"AI 적용 방식",
    html:`
      <div class="block qbox">
        <span class="lbl">Q — 전문가</span>
        <p style="margin:0">'현황 조회 · 대여 신청' 과정에 AI Studio를 어떻게 적용할 것인가? (대화형 챗봇 접수 / 상황별 장비 추천 / 사유 텍스트 분석 등)</p>
      </div>
      <div class="block abox">
        <span class="lbl">A — 사용자</span>
        <p style="margin:0">웹 요소를 통해 입력</p>
      </div>
      <div class="block rbox">
        <span class="lbl">확정</span>
        <p style="margin:0">입력 방식은 <b>일반 웹 UI</b>(드롭다운·텍스트 박스 등). 챗봇 같은 대화형은 아님. AI는 <b>백그라운드에서 데이터 처리·자동화</b>를 담당하는 것으로 방향 설정.</p>
      </div>`
  },
  {
    kind:"qa", tag:"질의응답 03", title:"적용할 AI 기능 선택",
    html:`
      <div class="block qbox">
        <span class="lbl">Q — 전문가 (3개 안 제시)</span>
        <ul class="plain">
          <li><b>신청 사유 분석·분류</b> — 사유 텍스트로 우선순위(<span class="chip urgent">긴급</span>/<span class="chip normal">일반</span>) 또는 부서 자동 할당</li>
          <li><b>연관 장비 추천</b> — 메인 장비 기반 부속품 추천 (카메라 → 삼각대·배터리)</li>
          <li><b>반납 시 상태 판독</b> — 반납 사진 업로드 시 외관 파손 1차 판독</li>
        </ul>
      </div>
      <div class="block abox">
        <span class="lbl">A — 사용자</span>
        <p style="margin:0">1, 2, 3 모두</p>
      </div>
      <div class="block rbox">
        <span class="lbl">확정</span>
        <p style="margin:0">세 가지 기능을 모두 <b>핵심 AI 모듈</b>로 설정.</p>
      </div>`
  },
  {
    kind:"qa", tag:"질의응답 04", title:"AI 작동 타이밍 & 결과 처리",
    html:`
      <div class="block qbox">
        <span class="lbl">Q — 전문가</span>
        <ul class="opts">
          <li data-n="1">신청 사유 분석 — 입력 즉시 긴급/일반 분류 → 관리자 대시보드 표시?</li>
          <li data-n="2">연관 장비 추천 — 메인 장비 선택 즉시 하단 팝업/토글 노출?</li>
          <li data-n="3">상태 판독 — 반납 사진 정상 시 자동 반납, 이상 시에만 관리자 알림?</li>
        </ul>
      </div>
      <div class="block abox">
        <span class="lbl">A — 사용자</span>
        <ul class="opts">
          <li data-n="1" class="pick">yes</li>
          <li data-n="2" class="pick">yes</li>
          <li data-n="3" class="drop">no — 이 기능 제외</li>
        </ul>
      </div>
      <div class="block rbox">
        <span class="lbl">확정</span>
        <p style="margin-bottom:8px"><b>채택</b> — 사유 분석(입력 즉시 분류 + 대시보드 연동), 연관 추천(선택 즉시 노출)</p>
        <p style="margin:0"><b>제외</b> — 반납 상태 판독</p>
      </div>`
  },
  {
    kind:"qa", tag:"질의응답 05", title:"대여 신청 필수 입력 항목",
    html:`
      <div class="block qbox">
        <span class="lbl">Q — 전문가</span>
        <p style="margin:0">'대여 신청' 화면에서 반드시 입력해야 하는 필수 데이터는? (신청자 성명/부서, 대여·반납 일시, 메인 장비, 신청 사유 등)</p>
      </div>
      <div class="block abox">
        <span class="lbl">A — 사용자</span>
        <p style="margin:0">모두 필요. 각 장비마다 <b>옵션 선택</b>이 있을 수 있음.</p>
      </div>
      <div class="block rbox">
        <span class="lbl">확정 — 필수 입력 항목</span>
        <ul class="plain">
          <li>신청자 (성명 / 부서)</li>
          <li>대여 / 반납 일시</li>
          <li>메인 장비</li>
          <li>장비별 옵션</li>
          <li>신청 사유</li>
        </ul>
      </div>`
  },
  {
    kind:"qa", tag:"질의응답 06", title:"대여 승인 프로세스",
    html:`
      <div class="block qbox">
        <span class="lbl">Q — 전문가</span>
        <ul class="opts">
          <li data-n="1">재고 확인 후 신청 즉시 자동 승인</li>
          <li data-n="2">관리자(또는 부서장) 수동 승인 후 확정</li>
          <li data-n="3">AI 분류 결과에 따라 분리 (긴급 자동 / 일반 수동)</li>
        </ul>
      </div>
      <div class="block abox">
        <span class="lbl">A — 사용자</span>
        <ul class="opts"><li data-n="2" class="pick">관리자 수동 승인 후 확정</li></ul>
      </div>
      <div class="block rbox">
        <span class="lbl">확정</span>
        <p style="margin:0">승인 프로세스 = <b>관리자 수동 승인 후 확정</b></p>
      </div>`
  },
  {
    kind:"qa", tag:"질의응답 07", title:"현황 조회 & 결과 알림",
    html:`
      <div class="block qbox">
        <span class="lbl">Q — 전문가</span>
        <ul class="opts">
          <li data-n="1">현황 조회 — 메인 화면에 재고·대여 가능 일자를 캘린더/리스트로 노출?</li>
          <li data-n="2">알림 채널 — 승인/반려·반납 촉구를 어디로? (이메일 / 사내 메신저 / 웹앱 내)</li>
        </ul>
      </div>
      <div class="block abox">
        <span class="lbl">A — 사용자</span>
        <ul class="opts">
          <li data-n="1" class="pick">yes (캘린더/리스트)</li>
          <li data-n="2" class="pick">이메일</li>
        </ul>
      </div>
      <div class="block rbox">

const kindNames = {setup:"시작 · 지시", qa:"질의응답", deliver:"산출물"};

const stage = document.getElementById('stage');
const segWrap = document.getElementById('segments');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const curEl = document.getElementById('cur');
const totalEl = document.getElementById('total');
const kindLabel = document.getElementById('kindLabel');
let idx = 0;

totalEl.textContent = String(stages.length).padStart(2,'0');

// build segments
stages.forEach((s,i)=>{
  const seg = document.createElement('button');
  seg.className = 'seg';
  seg.dataset.kind = s.kind;
  seg.setAttribute('aria-label', (i+1)+'단계: '+s.title);
  seg.addEventListener('click', ()=>go(i));
  segWrap.appendChild(seg);
});
const segs = [...segWrap.children];

function render(){
  const s = stages[idx];
  stage.innerHTML = `
    <div class="card anim ${s.kind}">
      <div class="card-head">
        <span class="kind ${s.kind}">${s.tag}</span>
        <span class="idx"><b>${String(idx+1).padStart(2,'0')}</b> / ${String(stages.length).padStart(2,'0')}</span>
      </div>
      <h1 class="title">${s.title}</h1>
      <div class="rule"></div>
      <div class="body">${s.html}</div>
    </div>`;
  segs.forEach((seg,i)=>{
    seg.classList.toggle('on', i<=idx);
    seg.classList.toggle('done', i<idx);
  });
  curEl.textContent = String(idx+1).padStart(2,'0');
  kindLabel.textContent = kindNames[s.kind];
  prevBtn.disabled = idx===0;
  nextBtn.textContent = idx===stages.length-1 ? '완료 ●' : '다음 ▶';
  stage.scrollTop = 0;
}
function go(i){ idx = Math.max(0, Math.min(stages.length-1, i)); render(); }
prevBtn.addEventListener('click', ()=>go(idx-1));
nextBtn.addEventListener('click', ()=>{ if(idx<stages.length-1) go(idx+1); });
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(idx+1);
  if(e.key==='ArrowLeft') go(idx-1);
});
render();
</script>
