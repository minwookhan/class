baseURL: "https://class.sparkylab.co.kr/"
title: "sparkylab.elec"
locale: "ko-KR"
defaultContentLanguage: "ko"

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: 과목
      pageRef: /docs
      weight: 1
    - name: 검색
      weight: 2
      params:
        type: search

params:
  navbar:
    displayTitle: true
    displayLogo: false
  theme:
    default: system
    displayToggle: true
  page:
    width: wide
    displayPagination: true
  displayUpdatedDate: false
